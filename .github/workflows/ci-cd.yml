  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 4 — Terraform Apply (only on main, only if plan succeeded)
  # ──────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: "Stage 4 · Deploy"
    runs-on: ubuntu-latest
    needs: [dependency-prediction, terraform-plan]
    if: github.ref == 'refs/heads/main' && needs.terraform-plan.outputs.plan_exitcode != '1'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{secrets.AWS_SESSION_TOKEN}}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Emit dependency graph update
        run: |
          echo "Repo1 outputs updated. Downstream repos (Repo2) will pick up new state on next run."
          terraform output -json > /tmp/repo1_outputs.json
          cat /tmp/repo1_outputs.json
