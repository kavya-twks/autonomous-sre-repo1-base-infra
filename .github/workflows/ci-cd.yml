name: Base Infra CI/CD — Autonomous SRE

on:
  push:
    branches: [main, "fix/*"]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.0"
  REPO_NAME: repo1-base-infra

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 1 — Pre-merge dependency prediction (Claude API)
  # ──────────────────────────────────────────────────────────────────────────
  dependency-prediction:
    name: "Stage 1 · Dependency Prediction"
    runs-on: ubuntu-latest
    outputs:
      impact_report: ${{ steps.predict.outputs.impact_report }}
      safe_to_proceed: ${{ steps.predict.outputs.safe_to_proceed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt
          echo "files=$(cat /tmp/changed_files.txt | tr '\n' ',')" >> $GITHUB_OUTPUT

      - name: Predict cross-repo impact with Claude
        id: predict
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.parse

          changed_files = """${{ steps.changed.outputs.files }}"""
          repo = os.environ.get("REPO_NAME", "repo1-base-infra")

          prompt = f"""You are a cross-repo dependency analyzer for an AWS ECS deployment system.

          Repository: {repo}
          Changed files: {changed_files}

          This repository (Repo 1 - Base Infra) is depended on by:
          - Repo 2 (App Infra): reads vpc_id, subnet_ids, security_group_ids, ecs_cluster_name via remote state
          - Repo 3 (Frontend): reads ALB DNS name and ECS cluster ARN
          - Repo 4 (Backend API): reads ECS cluster ARN and task execution role ARN

          Dependency graph:
          Repo1 → Repo2 → Repo3
                        → Repo4

          Analyze the changed files and respond ONLY with a JSON object (no markdown):
          {{
            "safe_to_proceed": true/false,
            "blast_radius": ["repo2", "repo3", "repo4"] (only affected repos),
            "risk_level": "LOW|MEDIUM|HIGH|CRITICAL",
            "summary": "one sentence summary",
            "warnings": ["list of specific warnings"],
            "recommendation": "what to do"
          }}"""

          payload = json.dumps({
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 1000,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01"
              }
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          text = data["content"][0]["text"]
          clean = text.strip()
          if clean.startswith("```"):
              clean = clean.split("```")[1]
              if clean.startswith("json"):
                  clean = clean[4:]
          result = json.loads(clean.strip())

          print(f"=== DEPENDENCY IMPACT REPORT ===")
          print(json.dumps(result, indent=2))
          print(f"================================")

          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"safe_to_proceed={str(result['safe_to_proceed']).lower()}\n")
              f.write(f"impact_report={json.dumps(result)}\n")

          # Fail if critical
          if result["risk_level"] == "CRITICAL":
              print("::error::CRITICAL blast radius detected — blocking merge")
              exit(1)
          PYEOF

  # ──────────────────────────────────────────────────────────────────────────
  # STAGE 2 — Terraform Plan
  # ──────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: "Stage 2 · Terraform Plan"
    runs-on: ubuntu-latest
    needs: dependency-prediction
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
      plan_output: ${{ steps.plan.outputs.plan_output }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{secrets.AWS_SESSION_TOKEN}}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -input=false -detailed-exitcode -out=tfplan 2>&1 | tee /tmp/plan_output.txt
          EXITCODE=$?
          echo "exitcode=$EXITCODE" >> $GITHUB_OUTPUT
          PLAN_OUTPUT=$(cat /tmp/plan_output.txt | tail -50)
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          # exitcode 2 = changes present (not failure), 1 = error
          if [ $EXITCODE -eq 1 ]; then exit 1; fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfplan
          path: tfplan

